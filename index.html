function buildFilters(){const cls={theme:"t",skills:"c"},lbl={theme:T().fTheme,skills:T().fSkill},f={theme:themeLbl,skills:skillLbl};
 $("#filters").innerHTML=["theme","skills"].map(dim=>`<div class="frow"><span class="flab">${lbl[dim]}</span>`+
  uniq(dim).map(v=>`<button class="fbtn ${cls[dim]} ${v==state[dim]?'active':''}" data-dim="${dim}" data-v="${v}">${f[dim](v)}</button>`).join('')+`</div>`).join('');}
function match(p){return(state.theme=="Tous"||p.theme==state.theme)&&(state.skills=="Tous"||(p.skills||[]).includes(state.skills));}
function card(p,i){const L=state.lang;const play=p.vtype=="pdf"?T().pres:T().dash;
 const cap=`<span class="tcat">${themeLbl(p.theme)}</span>`,pl=`<span class="play">${play}</span>`;
 let thumb;
 if(p.liveThumb)thumb=`<div class="thumb">${cap}<iframe class="liveframe" src="${p.view}" scrolling="no" loading="lazy"></iframe>${pl}</div>`;
 else if(p.img)thumb=`<div class="thumb">${cap}<img src="assets/${p.img}.jpg" alt="" loading="lazy">${pl}</div>`;
 else thumb=`<div class="thumb noimg" style="background:linear-gradient(135deg,#1d4a27,#9a5a2f)">${cap}📊${pl}</div>`;
 return `<div class="card${p.pinned?' pinned':''}" style="animation-delay:${i*32}ms" onclick="openView(${p._i})">
  ${thumb}<div class="body"><h3>${p.t[L]}</h3><div class="val">💼 <b>${L=='fr'?'Valeur métier':'Business value'} :</b> ${p.val[L]}</div>
  <div class="desc">${p.desc[L]}</div><div class="tools">${p.tools.map(t=>`<span class="tool">${toolLbl(t)}</span>`).join('')}</div>
  <div class="foot"><span class="badge ${badgeCls(p.badge)}">${badgeLbl(p.badge)}</span><span class="open">${play}</span></div></div></div>`;}
function render(){const nofilter=state.theme=="Tous"&&state.skills=="Tous";
 const list=DATA.filter(match).sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
 const g=$("#grid");g.className="grid"+(nofilter?" full":"");g.innerHTML=list.map(card).join('');
 $("#count").textContent=list.length+" "+T().shown;}
function renderUI(){const t=T();$("#tag").textContent=t.tag;$("#chipProj").innerHTML="📂 "+t.voirProjets;
 $("#footer").textContent=t.footer;$("#lbfull").textContent=t.full;$("#lbclose").textContent="× "+t.close;
 const dash=DATA.filter(p=>p.vtype=="live").length,cli=DATA.filter(p=>p.badge=="Mission cliente").length,th=uniq("theme").length-1;
 $("#stats").innerHTML=[[DATA.length,t.projets],[dash,t.dashboards],[cli,t.clientes],[th,t.themes]]
  .map(s=>`<div class="stat"><div class="n">${s[0]}</div><div class="l">${s[1]}</div></div>`).join('');
 document.documentElement.lang=state.lang;}
function openView(idx){const p=DATA[idx];if(!p)return;$("#lbttl").textContent=p.t[state.lang];$("#lbnew").href=p.view;$("#lbf").src=p.view;$("#lb").classList.add("show");}
function closeLB(){$("#lb").classList.remove("show");$("#lbf").src="";}
function setLang(l){state.lang=l;$$(".langsw button").forEach(b=>b.classList.toggle("active",b.dataset.l==l));renderUI();buildFilters();render();}
$$(".langsw button").forEach(b=>b.onclick=()=>setLang(b.dataset.l));
$("#filters").addEventListener("click",e=>{const b=e.target.closest(".fbtn");if(!b)return;state[b.dataset.dim]=b.dataset.v;
 $$(".fbtn").forEach(x=>{if(x.dataset.dim==b.dataset.dim)x.classList.toggle("active",x.dataset.v==state[b.dataset.dim]);});render();});
document.addEventListener("keydown",e=>{if(e.key=="Escape")closeLB();});
renderUI();buildFilters();render();
</script></body></html>
